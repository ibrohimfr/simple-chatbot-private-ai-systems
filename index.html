<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Chatbot</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; box-sizing: border-box; }
    .chat-container { width: 100%; height: 100vh; display: flex; flex-direction: column; background: white; padding: 20px; box-sizing: border-box; }
    .chat-box { flex: 1; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; flex-direction: column; gap: 12px; }
    .message { padding: 10px 15px; border-radius: 6px; max-width: 85%; word-wrap: break-word; line-height: 1.5; }
    .message p { margin: 0 0 8px 0; }
    .message p:last-child { margin-bottom: 0; }
    .message pre { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 4px; overflow-x: auto; margin: 8px 0; }
    .message code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; }
    .message pre code { background: none; padding: 0; }
    .user { background: #007bff; color: white; align-self: flex-end; white-space: pre-wrap; }
    .bot { background: #e9ecef; color: black; align-self: flex-start; }
    .error { background: #ffdddd; color: #d8000c; align-self: center; font-size: 0.9em; }
    .input-group { display: flex; gap: 10px; }
    input { flex: 1; padding: 15px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 15px 25px; font-size: 16px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    button:disabled { background: #a0c4ff; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-box" id="chat-box">
      <div class="message bot"><p>Hello! How can I help you today?</p></div>
    </div>
    <div class="input-group">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    userInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      if (sender === 'bot' || sender === 'error') {
        msgDiv.innerHTML = text === '...' ? text : marked.parse(text);
      } else {
        msgDiv.textContent = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msgDiv;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage(message, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      const loadingMsg = appendMessage('...', 'bot');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        chatBox.removeChild(loadingMsg);

        if (response.ok) {
          appendMessage(data.reply, 'bot');
        } else {
          appendMessage(data.error || 'Server returned an error.', 'error');
        }
      } catch (error) {
        chatBox.removeChild(loadingMsg);
        appendMessage('Network error. Could not connect to the server.', 'error');
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }
  </script>
</body>
</html>
